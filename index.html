<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>SUI SHOP</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<div class="shop-name">SUI SHOP</div>

<nav class="menu">
<button onclick="showCategory('all')">TRANG CHỦ</button>
<button onclick="showCategory('ao')">ÁO</button>
<button onclick="showCategory('quan')">QUẦN</button>
<button onclick="showCategory('giay')">GIÀY & DÉP</button>
<button onclick="showCategory('phukien')">PHỤ KIỆN</button>
</nav>

<input type="text" id="search" placeholder="Tìm sản phẩm...">

<div id="userBox">
<span id="welcome"></span>
<button id="loginBtn" onclick="goToLogin()">Đăng nhập</button>
<button id="logoutBtn" onclick="logout()">Đăng xuất</button>
</div>
</header>

<h2 class="title">Danh sách sản phẩm</h2>

<div class="slider">
<button class="nav left" onclick="prevProduct()">❮</button>

<div class="products-wrapper">
<div id="productList" class="products"></div>
</div>

<button class="nav right" onclick="nextProduct()">❯</button>
</div>

<h2 class="title">Giỏ hàng 🛒</h2>
<ul id="cart"></ul>

<button onclick="showCheckout()" style="margin:20px;background:#27ae60">
Thanh toán
</button>

<!-- CHECKOUT -->
<div id="checkoutBox" class="checkout">
<h2>Thanh toán</h2>

<input type="text" id="phone" placeholder="Số điện thoại">
<input type="text" id="address" placeholder="Địa chỉ">

<select id="paymentMethod">
<option value="cod">Thanh toán khi nhận hàng</option>
<option value="bank">Chuyển khoản</option>
</select>

<button onclick="confirmCheckout()">Xác nhận</button>
</div>

<script src="script.js"></script>
</body>
</html>
