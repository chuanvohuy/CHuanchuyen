<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng nhập - SUI SHOP</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login-body">

<div class="login-container">

    <h2>SUI SHOP</h2>

    <!-- LOGIN -->
    <div class="box">
        <h3>Đăng nhập</h3>
        <input id="loginUser" placeholder="Tên đăng nhập">
        <input id="loginPass" type="password" placeholder="Mật khẩu">
        <button onclick="login()">Đăng nhập</button>
    </div>

    <!-- REGISTER -->
    <div class="box">
        <h3>Đăng ký</h3>
        <input id="regUser" placeholder="Tên đăng nhập">
        <input id="regPass" type="password" placeholder="Mật khẩu">
        <button onclick="register()">Đăng ký</button>
    </div>

    <button class="back-btn" onclick="location.href='index.html'">⬅ Quay lại</button>

</div>

<script src="script.js"></script>
</body>
</html>
